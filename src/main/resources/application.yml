server:
  port: ${PORT:5000}
  address: 0.0.0.0
spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  cache:
    type: caffeine
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      keepalive-time: 60000
      connection-test-query: SELECT 1
      idle-timeout: 300000
      max-lifetime: 600000
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

gemini:
  api:
    key: ${GEMINI_API_KEY:}

yahoo:
  shopping:
    app-id: ${YAHOO_SHOPPING_APP_ID:}

apify:
  token: ${APIFY_TOKEN:}

ottPay:
  merchant-id: ${OTTPAY_MERCHANT_ID:ON00011082}
  sign-key: ${OTTPAY_SIGN_KEY:E3BA1A6E1E18C8C7}
  operator-id: ${OTTPAY_OPERATOR_ID:0000040308}

rakuten:
  base-url: https://openapi.rakuten.co.jp
  path: /ichibams/api/IchibaItem/Search/20170706
  referer: https://zilaibuy.com/
  application-id: ${RAKUTEN_APPLICATION_ID}
  access-key: ${RAKUTEN_ACCESS_KEY}
  affiliate-id: ${RAKUTEN_AFFILIATE_ID:}
  books-application-id: ${RAKUTEN_BOOKS_APPLICATION_ID:${RAKUTEN_APPLICATION_ID}}
  books-access-key: ${RAKUTEN_BOOKS_ACCESS_KEY:${RAKUTEN_ACCESS_KEY}}
  default-hits: 5
  default-image-flag: 1
  timeout-ms: 8000

wechat:
  appid: ${WECHAT_APPID:}
  secret: ${WECHAT_SECRET:}

google:
  translate:
    api-key: ${GOOGLE_TRANSLATE_API_KEY}
  places:
    api-key: ${GOOGLE_PLACES_API_KEY:${GOOGLE_TRANSLATE_API_KEY:}}

app:
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:4200,https://zilaibuy.com,https://www.zilaibuy.com,https://xcxapi.zilaibuy.com"
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:53029}

jwt:
  secret: ${JWT_SECRET}
  expiry-hours: ${JWT_EXPIRY_HOURS:1}
  refresh-expiry-days: ${REFRESH_TOKEN_EXPIRY_DAYS:7}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  from-phone: ${TWILIO_FROM_PHONE:}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY:}

paypal:
  client-id: ${PAYPAL_CLIENT_ID:Ad2PmLaqphrQttZsZXuXbyMg3IM9qZEWBjqRCm78DK7YR0HbSjOthxXdydYlzJdARrdZt4XMAcvO0_Iq}
